<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Runebook</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/press-start-2p@5.0.0/index.css">
<style>


*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#12093a;--bg2:#1a1050;--bg3:#221668;--bd1:#7040c8;--bd2:#3a1e80;--bdg:#c89018;--tx1:#fff;--tx2:#f0d060;--tx3:#9878c8;--gold:#ffd040;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,#2a1060 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#1a2060 0%,transparent 50%);color:var(--tx1);font-family:monospace;min-height:100vh;padding:16px;}
.app{max-width:660px;margin:0 auto;}
.pf{font-family:'Press Start 2P',monospace;}
.panel{background:var(--bg2);border:2px solid var(--bd1);border-radius:12px;padding:20px;position:relative;box-shadow:0 0 30px rgba(112,64,200,.3);}
.panel::before{content:'';position:absolute;inset:5px;border:1px solid var(--bd2);border-radius:9px;pointer-events:none;}
.tb{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:2px solid var(--bd2);margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.logo{font-family:'Press Start 2P',monospace;color:var(--gold);font-size:11px;text-shadow:0 0 12px rgba(255,208,64,.5);}
.logo span{color:#ff7040;}
.xw{display:flex;flex-direction:column;gap:5px;min-width:130px;}
.xn{display:flex;justify-content:space-between;font-size:8px;color:var(--tx3);}
.xt{height:8px;background:#0a0620;border-radius:4px;border:1px solid var(--bd2);overflow:hidden;}
.xf{height:100%;background:linear-gradient(90deg,#8040ff,#ffd040);border-radius:4px;transition:width .5s;}
.lv-badge{background:#2a1060;border:2px solid var(--bdg);color:var(--gold);font-size:7px;padding:4px 10px;border-radius:3px;font-family:'Press Start 2P',monospace;}
.streak-pill{display:flex;align-items:center;gap:5px;background:#2a1008;border:2px solid #c04010;border-radius:8px;padding:4px 9px;font-family:'Press Start 2P',monospace;font-size:8px;color:#ff7040;}
.tabs{display:flex;border-bottom:2px solid var(--bd2);margin-bottom:16px;}
.tab{flex:1;padding:10px;background:none;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--tx3);transition:color .15s;}
.tab.on{color:var(--gold);border-bottom:2px solid var(--gold);}
.gtog{display:flex;border:2px solid var(--bd2);border-radius:5px;overflow:hidden;margin-bottom:12px;}
.gt{flex:1;padding:9px;background:#140830;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--tx3);transition:background .15s,color .15s;}
.gt.on{background:#5030a0;color:#e8d0ff;}
.btn{display:block;width:100%;padding:12px 14px;border:2px solid;border-radius:6px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:.4px;text-align:center;transition:filter .15s,transform .1s;line-height:1.5;}
.btn:hover:not(.dis){filter:brightness(1.3);transform:translateY(-2px);}
.btn:active:not(.dis){transform:translateY(0);}
.gc{background:#0a3020;border-color:#30c060;color:#60ffaa;}
.gg{background:#302008;border-color:#d09020;color:#ffd040;}
.gn{background:#082818;border-color:#20b050;color:#50ff90;}
.gx{background:#300808;border-color:#d03020;color:#ff8070;}
.gp{background:#1e0840;border-color:#8040d0;color:#c080ff;}
.gr{background:#1a0e40;border-color:#4a28a0;color:#a890f0;}
.gb2{background:#20100a;border-color:#c04010;color:#ff7040;}
.dis{background:#100c20;border-color:#2a1880;color:#4a3890;cursor:not-allowed;opacity:.7;}
input,textarea{width:100%;background:#0c0830;border:2px solid #5030a0;border-radius:6px;color:var(--tx1);padding:10px 13px;font-family:monospace;font-size:13px;margin-bottom:10px;}
input:focus,textarea:focus{outline:none;border-color:#a060ff;}
input::placeholder,textarea::placeholder{color:#4030a0;}
textarea{min-height:100px;line-height:1.65;resize:vertical;}
.cc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.cc{background:#140a38;border:2px solid var(--bd2);border-radius:8px;padding:9px 6px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center;}
.cc:hover{border-color:#a060ff;background:#1e1050;}
.cc.on{border-color:var(--gold);}
.nm{font-size:6px;color:var(--tx2);margin-top:4px;display:block;line-height:1.5;font-family:'Press Start 2P',monospace;}
.pr-badge{display:inline-block;font-size:6px;background:#1a0840;border:1px solid #8040d0;color:#c080ff;padding:2px 5px;border-radius:2px;margin-top:3px;}
/* DIFFICULTY */
.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.diff-card{border:2px solid;border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;overflow:hidden;transition:filter .15s,transform .1s;}
.diff-card:hover{filter:brightness(1.2);transform:translateY(-1px);}
.diff-card.on{filter:brightness(1.3);}
.diff-e{background:#082818;border-color:#20a050;color:#50ff90;}
.diff-n{background:#181030;border-color:#6030c0;color:#c080ff;}
.diff-h{background:#280808;border-color:#c02020;color:#ff6060;}
/* COMBAT */
.combat-bars{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.cbar{border:2px solid;border-radius:8px;padding:10px 12px;}
.cbar-hero{border-color:#2060d0;background:#080c20;}
.cbar-boss{border-color:#a02020;background:#180808;}
.cbar-label{font-size:7px;margin-bottom:5px;font-family:'Press Start 2P',monospace;}
.cbar-name{font-size:9px;margin-bottom:6px;line-height:1.4;}
.hp-track{height:12px;background:#0a0620;border-radius:6px;border:1px solid #2a1880;overflow:hidden;margin-bottom:3px;}
.hp-fill{height:100%;border-radius:5px;transition:width .5s;}
.hp-text{font-size:7px;font-family:'Press Start 2P',monospace;}
/* QUIZ OPS */
.ops{display:flex;flex-direction:column;gap:9px;}
.op{display:block;width:100%;padding:13px 16px;background:#1a1050;border:2px solid #5030a0;border-radius:8px;cursor:pointer;font-family:monospace;font-size:13px;color:#d8c8ff;text-align:left;transition:border-color .15s,background .15s,color .15s;line-height:1.6;}
.op:hover:not(.ds){border-color:#a070ff;background:#251868;color:#fff;}
.op.co{border-color:#30c060;background:#082818;color:#60ff90;}
.op.wr{border-color:#d03020;background:#280808;color:#ff8070;}
.op.ds{cursor:default;}
/* FLIP CARD */
.fw{perspective:1000px;height:210px;margin-bottom:13px;cursor:pointer;}
.fi{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s;}
.fi.fl{transform:rotateY(180deg);}
.cf{position:absolute;inset:0;backface-visibility:hidden;background:#140a38;border:2px solid #5030a0;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;}
.cf.bk2{transform:rotateY(180deg);border-color:#a060ff;background:#180e40;}
.ctg{font-size:7px;color:var(--tx3);margin-bottom:8px;letter-spacing:2px;font-family:'Press Start 2P',monospace;}
.cq{font-size:13px;line-height:1.8;color:var(--tx1);}
.ctp{font-size:7px;color:#4030a0;margin-top:10px;}
.dots{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:#201060;}
.dot.dn{background:#30c060;}.dot.nw{background:var(--gold);}
.qbox{background:#140a38;border:2px solid #5030a0;border-radius:9px;padding:14px;font-size:13px;line-height:1.8;color:#fff;margin-bottom:13px;}
/* SCROLL */
.scroll{background:#0e0830;border:2px solid var(--bdg);border-radius:10px;padding:18px;margin-bottom:14px;position:relative;box-shadow:0 0 20px rgba(200,144,24,.2);}
.scroll::after{content:'';position:absolute;inset:5px;border:1px solid #4a3010;border-radius:7px;pointer-events:none;}
.sq-tag{display:inline-block;background:#2a1e0820;border:1px solid var(--bdg);color:var(--gold);font-size:7px;padding:4px 10px;border-radius:3px;margin-bottom:9px;font-family:'Press Start 2P',monospace;}
.sq-title{font-size:10px;color:#ffd060;line-height:1.6;margin-bottom:9px;font-family:'Press Start 2P',monospace;}
.sq-loc{font-size:10px;color:#a08040;margin-bottom:12px;}
.sq-story{font-size:12px;color:#c0b0e0;line-height:1.9;margin-bottom:13px;font-style:italic;}
.sq-boss{background:#2a08081a;border:2px solid #d03020;border-radius:7px;padding:11px 13px;}
.sq-boss-lbl{font-size:7px;color:#ff5566;margin-bottom:5px;font-family:'Press Start 2P',monospace;}
.sq-boss-nm{font-size:11px;color:#ffbbcc;line-height:1.6;}
.back{display:inline-block;background:#180e40;border:2px solid #5030a0;border-radius:5px;color:#c0a8ff;cursor:pointer;font-family:monospace;font-size:13px;padding:7px 14px;margin-bottom:13px;transition:border-color .15s,color .15s;}
.back:hover{border-color:#a060ff;color:#fff;}
.er{background:#280808;border:2px solid #cc2828;border-radius:6px;padding:11px 13px;color:#ff9090;font-size:11px;margin-bottom:10px;line-height:1.7;}
.dcard{background:#140a38;border:2px solid #5030a0;border-radius:10px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;}
.dcard.final-boss{border-color:#ffd040;background:#1e1408;box-shadow:0 0 18px rgba(255,208,64,.25);}
.dcard:hover{border-color:#a060ff;}
.dnum{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--bdg);min-width:28px;text-align:center;}
.dinfo{flex:1;}
.dtitle{font-size:11px;color:#fff;margin-bottom:4px;line-height:1.5;}
.dloc{font-size:9px;color:var(--tx3);}
.dstat{font-size:8px;margin-top:5px;}
.dbtns{display:flex;gap:7px;flex-direction:column;}
.dbtn{padding:7px 10px;border:2px solid;border-radius:5px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:7px;background:transparent;white-space:nowrap;transition:filter .15s;}
.dbtn:hover{filter:brightness(1.4);}
.dbtn-s{border-color:#d09020;color:#ffd040;}
.dbtn-q{border-color:#20b050;color:#50ff90;}
.cleared-badge{display:inline-block;background:#1a3008;border:1px solid #40a020;border-radius:3px;color:#70e040;font-size:7px;padding:2px 6px;margin-left:6px;font-family:'Press Start 2P',monospace;}
.csgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.cscard{background:#140a38;border:2px solid var(--bd2);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.cscard:hover{border-color:#a060ff;background:#1e1060;}
.cscard.active{border-color:var(--gold);}
.cscard.claimed{border-color:#5030a0;}
.slot-bar{display:flex;gap:5px;justify-content:center;margin:6px 0;}
.slot{width:18px;height:8px;border-radius:3px;border:2px solid #5030a0;}
.slot.used{background:#a060ff;border-color:#c080ff;}
.xpp{position:absolute;top:55px;right:16px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);pointer-events:none;animation:popUp 1.8s forwards;z-index:10;text-shadow:0 0 10px rgba(255,208,64,.8);}
.lvup-screen{text-align:center;padding:20px 0;}
.ob-slide{text-align:center;padding:10px 0 20px;}
.ob-icon{font-size:52px;margin-bottom:16px;}
.ob-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:12px;line-height:1.6;}
.ob-desc{font-size:12px;color:var(--tx3);line-height:1.9;max-width:380px;margin:0 auto 20px;}
.ob-dots{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
.ob-dot{width:10px;height:10px;border-radius:50%;background:#3a1e80;}
.ob-dot.on{background:var(--gold);}
.review-card{background:#200808;border:2px solid #8a1020;border-radius:9px;padding:14px;margin-bottom:10px;}
.review-q{font-size:12px;color:#ffaaaa;margin-bottom:8px;line-height:1.6;}
.review-a{font-size:12px;color:#60ff90;line-height:1.6;}
.streak-bar{display:flex;align-items:center;gap:10px;background:#1e1060;border:2px solid #8040d0;border-radius:8px;padding:10px 14px;margin-bottom:12px;}
.streak-fire{font-size:20px;}
.streak-text{font-size:8px;color:#ffd040;}
.streak-bonus{font-size:9px;color:#ff9040;margin-left:auto;}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:12px 0;}
.plan{background:#140a38;border:2px solid var(--bd2);border-radius:9px;padding:16px;text-align:center;}
.plan.feat{border-color:#8040d0;box-shadow:0 0 16px rgba(128,64,208,.3);}
.perfect-banner{background:linear-gradient(135deg,#1a0840,#0a2040);border:2px solid var(--gold);border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:300px;margin:0 auto 14px;}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;max-width:400px;margin:0 auto 14px;}
.sc{background:#140a38;border:2px solid var(--bd1);border-radius:9px;padding:13px;text-align:center;}
.sv{font-size:14px;color:#60ffaa;font-family:'Press Start 2P',monospace;}
.sl{font-size:8px;color:var(--tx3);margin-top:4px;}
.rb{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.la{text-align:center;padding:55px 20px;}
.spin{font-size:36px;display:inline-block;animation:spin 1.4s linear infinite;margin-bottom:16px;}
.lm{font-size:9px;color:var(--tx3);line-height:2.6;}
.lbl{display:block;font-size:8px;color:var(--tx3);margin-bottom:7px;font-family:'Press Start 2P',monospace;}
.tip{font-size:10px;color:var(--tx3);text-align:center;margin-top:8px;}
.row{display:flex;gap:9px;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;gap:9px;}
.f1{flex:1;}
.bob{animation:bob 2.5s ease-in-out infinite;}
.heart{display:inline-block;font-size:20px;color:#ff2020;filter:drop-shadow(0 0 4px #ff000088);line-height:1;}
.heart.lost{color:#1a0808;filter:none;opacity:.25;}
/* UPLOAD DROP ZONE */
.dropzone{background:#0c0830;border:2px dashed #5030a0;border-radius:10px;padding:22px;text-align:center;cursor:pointer;margin-bottom:12px;transition:border-color .2s,background .2s;}
.dropzone:hover{border-color:#a060ff;background:#100c38;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-48px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeIn .4s ease-out;}
.shaking{animation:shake .5s;}


/* ── DAILY QUESTS ── */
.quest-card{background:#140a38;border:2px solid #5030a0;border-radius:9px;padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;}
.quest-card.done{border-color:#30c060;background:#082818;}
.quest-icon{font-size:22px;min-width:30px;text-align:center;}
.quest-info{flex:1;}
.quest-title{font-size:11px;color:#fff;margin-bottom:4px;}
.quest-prog{height:8px;background:#0a0620;border-radius:4px;overflow:hidden;margin-top:4px;}
.quest-fill{height:100%;border-radius:4px;transition:width .4s;}
.quest-reward{font-size:9px;color:var(--gold);margin-top:3px;}
/* ── ACHIEVEMENTS ── */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ach{background:#140a38;border:2px solid #2a1060;border-radius:8px;padding:10px;text-align:center;transition:border-color .2s;}
.ach.earned{border-color:var(--bdg);background:#1e1408;}
.ach.earned:hover{border-color:var(--gold);}
.ach-icon{font-size:24px;margin-bottom:5px;}
.ach-name{font-size:7px;line-height:1.5;color:var(--tx2);font-family:'Press Start 2P',monospace;}
.ach-desc{font-size:9px;color:var(--tx3);margin-top:3px;line-height:1.5;}
/* ── MASTERY STARS ── */
.stars{display:flex;gap:2px;margin-top:3px;}
.star{font-size:11px;opacity:.2;}
.star.earned{opacity:1;}
/* ── SPELLS ── */
.spell-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.spell-card{background:#140a38;border:2px solid #5030a0;border-radius:9px;padding:10px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.spell-card:hover{border-color:#a060ff;background:#1e1060;}
.spell-card.on{border-color:var(--gold);background:#2a1a08;}
.spell-card.dis{opacity:.35;cursor:not-allowed;}
.spell-icon{font-size:28px;margin-bottom:5px;}
.spell-btn{position:fixed;bottom:80px;right:16px;z-index:20;background:#2a1060;border:2px solid #a060ff;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;box-shadow:0 0 16px rgba(160,96,255,.4);}
.spell-btn.used{opacity:.3;cursor:not-allowed;}
/* ── TIMER ── */
.timer-bar{height:6px;border-radius:3px;margin-bottom:10px;overflow:hidden;background:#0a0620;border:1px solid #3a1e80;}
.timer-fill{height:100%;border-radius:3px;transition:width .1s linear;}
.timer-num{font-size:14px;font-family:'Press Start 2P',monospace;text-align:center;margin-bottom:8px;}
/* ── GAUNTLET ── */
.gauntlet-chain{display:flex;align-items:center;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.gc-node{background:#140a38;border:2px solid #5030a0;border-radius:7px;padding:6px 10px;text-align:center;min-width:60px;flex-shrink:0;}
.gc-node.done{border-color:#30c060;background:#082818;}
.gc-node.active{border-color:var(--gold);background:#2a1a08;}
/* ── CALENDAR ── */
.cal-grid{display:flex;gap:3px;flex-wrap:wrap;}
.cal-day{width:14px;height:14px;border-radius:2px;background:#0a0620;}
/* ── UNLOCK POPUP ── */
.unlock-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a0840;border:3px solid var(--gold);border-radius:14px;padding:24px 30px;text-align:center;z-index:100;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-width:280px;box-shadow:0 0 40px rgba(255,208,64,.4);}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.6)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
/* ── SHARE CARD ── */
.share-card{background:#0c0830;border:2px solid #8040d0;border-radius:10px;padding:14px;margin-bottom:12px;font-family:monospace;font-size:11px;color:#c0a8ff;line-height:1.8;white-space:pre-wrap;word-break:break-all;}

</style>
</head>
<body>
<div class="app"><div class="panel" id="app">Loading...</div></div>

function getRank(p){
  if(p>=100)return{label:'S',name:'PERFECT', color:'#e8d0ff',bg:'#2a0850',icon:'&#x1F451;',xp:100};
  if(p>=90) return{label:'A',name:'CHAMPION',color:'#ffd040',bg:'#2a1e00',icon:'&#x2B50;', xp:60};
  if(p>=80) return{label:'B',name:'WARRIOR', color:'#60ffaa',bg:'#002a14',icon:'&#x1F6E1;',xp:35};
  if(p>=70) return{label:'C',name:'CLEARED', color:'#c080ff',bg:'#1a0840',icon:'&#x2694;', xp:15};
  if(p>=50) return{label:'D',name:'CLOSE',   color:'#ff8070',bg:'#280808',icon:'&#x1F4A8;',xp:0};
  return         {label:'F',name:'DEFEATED', color:'#ff4040',bg:'#1a0000',icon:'&#x1F480;',xp:0};
}

function anyDungeonCleared(u){
  if(!u.chars)return false;
  return Object.values(u.chars).some(function(c){return c.dungeons&&c.dungeons.some(function(d){return(d.bestScore||0)>=70;});});
}
function anyHardCleared(u){
  if(!u.chars)return false;
  return Object.values(u.chars).some(function(c){return c.dungeons&&c.dungeons.some(function(d){return d.scores&&d.scores.hard&&d.scores.hard.best>=70;});});
}
function anyThreeStars(u){
  if(!u.chars)return false;
  return Object.values(u.chars).some(function(c){return c.dungeons&&c.dungeons.some(function(d){return getMastery(d)>=3;});});
}
function getMastery(d){
  if(!d.scores)return(d.bestScore||0)>=70?1:0;
  var m=0;
  if((d.scores.normal&&d.scores.normal.best||0)>=70)m=Math.max(m,1);
  if((d.scores.hard&&d.scores.hard.best||0)>=70)m=Math.max(m,2);
  if((d.scores.hard&&d.scores.hard.best||0)>=90)m=Math.max(m,3);
  return m;
}
function masteryStars(d){
  var m=getMastery(d);
  var s='<div class="stars">';
  for(var i=0;i<3;i++)s+='<span class="star'+(i<m?' earned':'')+'">&#x2B50;</span>';
  s+='</div>';return s;
}
function checkAchievements(){
  if(!U)return[];
  if(!U.achievements)U.achievements=[];
  var newOnes=[];
  ACHIEVEMENTS.forEach(function(a){
    if(U.achievements.indexOf(a.id)<0&&a.check(U)){
      U.achievements.push(a.id);newOnes.push(a);
    }
  });
  if(newOnes.length)saveUser();
  return newOnes;
}

function getDailyQuests(){
  if(!U)return[];
  if(!U.dailyQuests||U.dailyQuests.date!==today()){
    // Pick 3 random quests for today using date as seed
    var seed=today().replace(/-/g,'');
    var pool=QUEST_POOL.slice();
    // Simple seeded shuffle
    var s=parseInt(seed)%997;
    for(var i=pool.length-1;i>0;i--){s=(s*31+17)%997;var j=s%( i+1);var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;}
    U.dailyQuests={date:today(),quests:pool.slice(0,3).map(function(q){return{id:q.id,progress:0,done:false};})};
    saveUser();
  }
  return U.dailyQuests.quests.map(function(q){
    var def=QUEST_POOL.find(function(p){return p.id===q.id;})||QUEST_POOL[0];
    return Object.assign({},def,q);
  });
}
function updateQuest(type,val){
  var quests=getDailyQuests();var changed=false;
  quests.forEach(function(q){
    if(q.done)return;
    var match=false;
    if(q.type===type){
      if(type==='score_rank'&&val>=q.goal)match=true;
      else if(type==='study_cards'){q.progress=(q.progress||0)+val;if(q.progress>=q.goal)match=true;}
      else if(type==='clear_diff'&&val===q.goal)match=true;
      else if(type==='full_hp'&&val>=q.goal)match=true;
      else if(type==='combo'){q.progress=Math.max(q.progress||0,val);if(q.progress>=q.goal)match=true;}
      else if(type==='spell'&&val>=q.goal)match=true;
      else if(type==='any_clear'&&val>=q.goal)match=true;
      else if(type==='win_streak'){q.progress=(q.progress||0)+1;if(q.progress>=q.goal)match=true;}
    }
    if(match&&!q.done){
      q.done=true;changed=true;
      U.xp+=q.xp;U.lv=Math.floor(U.xp/XL)+1;
      if(!U._stats)U._stats={};
      U._stats.questDays=(U._stats.questDays||0);
      // Check if all done
      var allDone=quests.every(function(x){return x.done;});
      if(allDone){U._stats.questDays=(U._stats.questDays||0)+1;U.xp+=100;U.lv=Math.floor(U.xp/XL)+1;}
    }
    // Sync back
    U.dailyQuests.quests.forEach(function(dq){if(dq.id===q.id){dq.progress=q.progress;dq.done=q.done;}});
  });
  if(changed)saveUser();
}

async function testApiKey(){
  S.testResult=null;draw();
  var key=getApiKey();
  if(!key){S.testResult={ok:false,msg:'No key saved yet.'};draw();return;}
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-dangerous-allow-browser':'true',
        'x-api-key':key
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:10,
        messages:[{role:'user',content:'Hi'}]
      })
    });
    var data=await resp.json();
    if(resp.ok&&data.content){
      S.testResult={ok:true,msg:'&#x2713; Connection works! Key is valid and credits are active.'};
    }else if(data.error){
      S.testResult={ok:false,msg:'API error: '+data.error.message+' (type: '+data.error.type+')'};
    }else{
      S.testResult={ok:false,msg:'Unexpected response: '+JSON.stringify(data).slice(0,100)};
    }
  }catch(e){
    S.testResult={ok:false,msg:'Fetch failed: '+e.message+' — Browser may be blocking the request.'};
  }
  draw();
}

function updateStreak(){
  if(!U)return;if(!U.streak)U.streak=0;if(!U.lastStudy)return;
  var diff=Math.floor((new Date(today())-new Date(U.lastStudy))/(864e5));
  if(diff>1){U.streak=0;saveUser();}
}
function recordStudy(){
  if(!U)return;var t=today();if(U.lastStudy===t)return;
  var diff=U.lastStudy?Math.floor((new Date(t)-new Date(U.lastStudy))/(864e5)):1;
  U.streak=diff===1?(U.streak||0)+1:1;U.lastStudy=t;
  logStudyDay();saveUser();
}

// ── GAUNTLET ──
function startGauntlet(){
  var char=aC();if(!char||!char.dungeons.length)return;
  S.gauntlet=true;S.gauntletIdx=0;
  var d=curDiff();
  S.heroHP=d.hp;S.heroMaxHP=d.hp;
  S.gauntletHP=d.hp;S.gauntletMaxHP=d.hp;
  // Set first dungeon
  S.di=0;S.isFinal=false;
  S.qi=0;S.qs=0;S.sel=null;S.sxp=0;S.streak=0;S.wrongAnswers=[];
  S.bossMaxHP=100;S.bossHP=100;S.liveQuiz=null;
  S.chosenSpell=null;S.spellUsed=false;S.shieldActive=false;S.doubleActive=false;
  S.screen='quizgen';draw();
  var dung=char.dungeons[0];
  generateQuizQuestions(dung,d,false,char).then(function(q){
    S.liveQuiz=q;S.screen='quiz';draw();
  }).catch(function(e){
    if(dung.quiz&&dung.quiz.length){S.liveQuiz=dung.quiz.slice();S.screen='quiz';draw();}
    else{S.gauntlet=false;S.err='Could not start gauntlet. Try again.';S.screen='hero';draw();}
  });
}
function nextGauntletDungeon(){
  var char=aC();if(!char)return;
  S.gauntletIdx++;
  if(S.gauntletIdx>=char.dungeons.length){
    // Gauntlet complete!
    S.gauntlet=false;
    if(!U._stats)U._stats={};
    U._stats.gauntletWins=(U._stats.gauntletWins||0)+1;
    U.xp+=200;U.lv=Math.floor(U.xp/XL)+1;saveUser();
    var newAch=checkAchievements();
    if(newAch.length)S.unlockPopup=newAch[0];
    S.screen='qd';draw();return;
  }
  S.di=S.gauntletIdx;S.qi=0;S.qs=0;S.sel=null;S.streak=0;S.wrongAnswers=[];
  S.bossMaxHP=100;S.bossHP=100;S.liveQuiz=null;
  S.screen='quizgen';draw();
  var dung=char.dungeons[S.gauntletIdx];
  var d=DIFF[S.diffChosen||'normal']||DIFF.normal;
  generateQuizQuestions(dung,d,false,char).then(function(q){
    S.liveQuiz=q;S.screen='quiz';draw();
  }).catch(function(e){
    if(dung.quiz)S.liveQuiz=dung.quiz.slice();
    S.screen='quiz';draw();
  });
}

function handleDrop(e){e.preventDefault();var dz=document.getElementById('dropzone');if(dz)dz.style.borderColor='#5030a0';handleFiles(e.dataTransfer.files);}
function handleFiles(files){
  if(!files||!files.length)return;if(!S.uploadFiles)S.uploadFiles=[];
  Array.from(files).slice(0,10-S.uploadFiles.length).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(ev){
      var b64=ev.target.result.split(',')[1];var nm=file.name.toLowerCase(),mtype=file.type||'image/jpeg';
      if(nm.endsWith('.jpg')||nm.endsWith('.jpeg'))mtype='image/jpeg';
      else if(nm.endsWith('.png'))mtype='image/png';
      else if(nm.endsWith('.webp'))mtype='image/webp';
      else if(nm.endsWith('.pdf'))mtype='application/pdf';
      S.uploadFiles.push({name:file.name,b64:b64,mtype:mtype});draw();
    };
    reader.readAsDataURL(file);
  });
}

function buildPrompt(isFirst,char,isMath){
  var mathExtra=isMath?'\n\nIMPORTANT FOR MATH: Do NOT repeat equations from notes. Generate NEW practice problems of the same TYPE with different numbers. Show full working in flashcard answers.':'';
  var subjectLine=isFirst?'  "subject": "Specific academic subject, max 3 words",\n':'';
  var subjectGuard=isFirst?'Also identify the subject field.':('Hero LOCKED to: "'+char.subject+'". If content is NOT about this subject, return ONLY: {"error":"WRONG_SUBJECT","detected":"(actual)"}. Otherwise generate without subject field.');
  return subjectGuard+mathExtra+'\n\nReturn ONLY raw JSON:\n{\n'+subjectLine+'  "story":{"title":"Quest title max 8 words","setting":"Fantasy location","intro":"2-3 sentences with real terms","boss":"Boss name"},\n  "flashcards":[{"question":"...","answer":"..."}],\n  "quiz":[{"question":"...","options":["A","B","C","D"],"correct":0}]\n}\n4-8 flashcards, 3-6 quiz questions, correct is 0-3.';
}

async function callAPI(blocks){
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-allow-browser':'true','x-api-key':getApiKey()},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:blocks}]})
  });
  if(!resp.ok){var t=await resp.text();throw new Error('HTTP '+resp.status+': '+t.slice(0,120));}
  var data=await resp.json();if(data.error)throw new Error(data.error.message||'API error');
  var raw=data.content.map(function(b){return b.text||'';}).join('');
  var si=raw.indexOf('{'),ei=raw.lastIndexOf('}');
  if(si<0||ei<0)throw new Error('No JSON in response');
  return JSON.parse(raw.slice(si,ei+1));
}

async function doGen(){
  var ta=get('nta');if(ta)S.notes=ta.value;
  var hasFiles=S.uploadFiles&&S.uploadFiles.length>0,hasText=S.notes&&S.notes.trim().length>0;
  if(!hasFiles&&!hasText){S.err='Please upload files or paste some notes!';draw();return;}
  var char=aC();if(!char){draw();return;}
  if(!canAdd()){gotoPaywall();return;}
  S.screen='gen';S.err='';draw();
  var isFirst=char.dungeons.length===0;
  var isMath=char.subject&&/math|algebra|calculus|geometry|statistics|trig/i.test(char.subject);
  var blocks=[];
  if(hasFiles)S.uploadFiles.forEach(function(f){
    blocks.push(f.mtype==='application/pdf'?{type:'document',source:{type:'base64',media_type:'application/pdf',data:f.b64}}:{type:'image',source:{type:'base64',media_type:f.mtype,data:f.b64}});
  });
  if(hasText)blocks.push({type:'text',text:'Additional typed notes:\n'+S.notes});
  blocks.push({type:'text',text:'Generate study materials from the notes/images above.\n\n'+buildPrompt(isFirst,char,isMath)});
  try{
    var parsed=await callAPI(blocks);
    if(parsed.error==='WRONG_SUBJECT'){S.err='Wrong subject! Locked to "'+char.subject+'" but content is about "'+parsed.detected+'".';S.screen='upload';S.uploadFiles=[];draw();return;}
    if(!parsed.flashcards||!parsed.quiz)throw new Error('Missing content');
    if(isFirst&&parsed.subject)char.subject=parsed.subject;
    char.dungeons.push({id:Date.now().toString(),title:parsed.story?parsed.story.title:('Dungeon '+(char.dungeons.length+1)),
      story:parsed.story||null,cards:parsed.flashcards,quiz:parsed.quiz,notes:S.notes,bestScore:0,attempts:0});
    S.di=char.dungeons.length-1;S.notes='';S.uploadFiles=[];
    await saveUser();S.screen='dungeon';S.isFinal=false;
  }catch(ex){S.err='Dungeon generation failed: '+friendlyApiError(ex);S.screen='upload';S.uploadFiles=[];}
  draw();
}

async function generateQuizQuestions(dung,diffConfig,isFinal,char){
  var isMath=char&&char.subject&&/math|algebra|calculus|geometry|statistics|trig|arithmetic/i.test(char.subject);
  var qCount=diffConfig.qCount||7,diffLabel=diffConfig.label||'NORMAL';
  var diffPart='Difficulty: NORMAL. Mix straightforward and moderate.';
  if(diffLabel==='EASY')diffPart='Difficulty: EASY. Clear simple questions. Obviously wrong choices.';
  if(diffLabel==='HARD')diffPart='Difficulty: HARD. Tricky, edge cases, very plausible distractors.';
  var mathPart='';
  if(isMath){
    var r1=Math.floor(Math.random()*18)+3,r2=Math.floor(Math.random()*12)+2,r3=Math.floor(Math.random()*9)+1;
    if(diffLabel==='EASY')mathPart='MATH EASY: New one-step equations e.g. x+'+r1+'='+(r1+r2)+'. Never copy from notes.';
    else if(diffLabel==='NORMAL')mathPart='MATH NORMAL: New two-step equations e.g. '+r3+'x+'+r1+'='+(r3*r2+r1)+'. Never copy from notes.';
    else mathPart='MATH HARD: New complex multi-step problems, seeds '+r1+','+r2+','+r3+'. Never copy from notes.';
  }
  var source='No notes.';
  if(dung.notes&&dung.notes.trim())source=dung.notes.slice(0,2500);
  else if(dung.story)source=dung.story.title+'. '+(dung.story.intro||'');
  var sysMsg='You are a quiz generator. Respond with ONLY valid JSON. No markdown, no code fences.';
  var lines=['Generate '+qCount+' quiz questions based on source material below.',diffPart];
  if(mathPart)lines.push(mathPart);
  lines.push('SOURCE:\n'+source);
  lines.push('Return ONLY: {"quiz":[{"question":"...","options":["A","B","C","D"],"correct":0}]}');
  lines.push('Exactly '+qCount+' questions. correct is 0-3.');
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-allow-browser':'true','x-api-key':getApiKey()},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,system:sysMsg,messages:[{role:'user',content:lines.join('\n\n')}]})
  });
  if(!resp.ok){var t=await resp.text();throw new Error('HTTP '+resp.status+': '+t.slice(0,100));}
  var data=await resp.json();if(data.error)throw new Error(data.error.message||'API error');
  var raw=data.content.map(function(b){return b.text||'';}).join('').trim();
  raw=raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
  var si=raw.indexOf('{'),ei=raw.lastIndexOf('}');
  if(si<0||ei<0)throw new Error('No JSON found');
  var parsed;try{parsed=JSON.parse(raw.slice(si,ei+1));}
  catch(e){var fixed=raw.slice(si,ei+1).replace(/,(\s*[}\]])/g,'$1');try{parsed=JSON.parse(fixed);}catch(e2){throw new Error('Response was not valid JSON. Try again.');}}
  if(!parsed.quiz||!Array.isArray(parsed.quiz)||!parsed.quiz.length)throw new Error('No quiz in response');
  return parsed.quiz;
}

async function startQuiz(i,isFinal){

  var dung=isFinal?char.finalBoss:char.dungeons[i];
  if(!dung){S.err='Dungeon not found. Please try again.';S.screen='dungeon';draw();return;}
  S.screen='quizgen';draw();
  try{
    var fresh=await generateQuizQuestions(dung,d,isFinal,char);

    else{S.err=(S._lastQuizErr||'Could not load questions.')+' Using your saved questions instead.';S.screen='dungeon';}
  }
  draw();
}

function startSpeedRound(i){

  if(S.speedTimer)clearInterval(S.speedTimer);

function getCards(){
  var d=aD();if(!d||!d.cards)return[];
  if(!S.shuffled){
    S.shuffled=d.cards.map(function(_,i){return i;});
    for(var i=S.shuffled.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=S.shuffled[i];S.shuffled[i]=S.shuffled[j];S.shuffled[j]=tmp;}
  }
  return S.shuffled.map(function(i){return d.cards[i];});
}

function fcH(){
  var cards=getCards();if(!cards.length)return heroH();
  var d=aD();if(!S.againPile)S.againPile=[];
  var isReview=S.ci>=cards.length;

    S.speedLeft=5;
    S.speedTimer=setInterval(function(){
      S.speedLeft--;
      if(S.speedLeft<=0){clearInterval(S.speedTimer);S.speedTimer=null;cr(false);}
      else draw();
    },1000);
  }
  var dots='';
  cards.forEach(function(_,i){dots+='<div class="dot'+(i<S.ci?' dn':i===S.ci?' nw':'')+'"></div>';});
  var h=tb();
  if(S.pop)h+='<div class="xpp pf">'+(S.popMsg||'+'+S.pa+' XP')+'</div>';
  h+='<button class="back" onclick="endFC()">&#x25C4; Back</button>';

  var prev=U.lv;U.xp+=n;S.sxp+=n;S.pa=n;S.pop=true;S.popMsg=msg||'+'+n+' XP';
  U.lv=Math.floor(U.xp/XL)+1;saveUser();
  if(U.lv>prev){setTimeout(function(){S.lvupData={};S.prevScreen=S.screen;S.screen='lvup';draw();},400);}
  else setTimeout(function(){S.pop=false;draw();},1800);
}
function flip(){
  if(S.speedTimer){clearInterval(S.speedTimer);S.speedTimer=null;}
  S.fl=!S.fl;draw();
}
function prevC(){if(S.ci>0){S.ci--;S.fl=false;draw();}}
function cr(k){
  if(S.speedTimer){clearInterval(S.speedTimer);S.speedTimer=null;}
  var xpAmt=S.speedMode?20:10;
  if(k){xpu(xpAmt);updateQuest('study_cards',1);}
  else{if(!S.againPile)S.againPile=[];var cards=getCards();if(S.ci<cards.length)S.againPile.push(cards[S.ci]);}
  S.fl=false;
  var cards=getCards();
  if(S.ci<cards.length-1){S.ci++;S.speedLeft=5;draw();}
  else if(S.againPile&&S.againPile.length>0){S.ci=cards.length;draw();}
  else{recordStudy();S.againPile=null;S.shuffled=null;if(S.speedMode){S.speedMode=false;}goTo('dungeon');}
}
function pick(i){
  S.sel=i;
  var quiz=S.liveQuiz;if(!quiz||!quiz.length)return;
  var q=quiz[S.qi],ok=q&&i===q.correct;
  if(ok){
    S.streak++;
    if(!U._stats)U._stats={};
    U._stats.maxCombo=Math.max(U._stats.maxCombo||0,S.streak);
    updateQuest('combo',S.streak);
    var dmgMult=S.doubleActive?2:1;S.doubleActive=false;
    var earned=calcXP(20);
    var msg2=S.streak>=4?'&#x1F525;&#x1F525; x3! +'+earned+' XP':S.streak>=3?'&#x1F525; x2! +'+earned+' XP':S.streak>=2?'&#x26A1; STREAK! +'+earned+' XP':null;
    S.qs++;
    var qLen=(S.liveQuiz&&S.liveQuiz.length)||1;
    var dmg=(100/qLen)*dmgMult;
    if(S.streak>=4)dmg*=2;else if(S.streak>=3)dmg*=1.5;else if(S.streak>=2)dmg*=1.2;
    S.bossHP=Math.max(0,S.bossHP-dmg);
    xpu(earned,msg2);
  }else{
    S.streak=0;
    if(S.shieldActive){S.shieldActive=false;}
    else{S.heroHP=Math.max(0,S.heroHP-1);}
    if(!S.wrongAnswers)S.wrongAnswers=[];
    if(q)S.wrongAnswers.push({question:q.question,correct:q.options[q.correct]});
  }
  draw();
}
function nq(){
  if(S.heroHP<=0){S.screen='quiz';draw();return;}
  var quiz=S.liveQuiz;if(!quiz)return;
  if(S.qi===quiz.length-1&&S.qs===quiz.length){U.xp+=50;saveUser();}
  S.qi++;S.sel=null;
  if(S.qi>=quiz.length){
    recordStudy();
    if(S.gauntlet){nextGauntletDungeon();return;}
    S.screen='qd';
  }
  draw();
}
function rq(){startQuiz(S.di,S.isFinal);}

async function doLogout(){
  U=null;await stDel('rbUser');
  S.screen='auth';S.authEmail='';S.authPass='';S.authName='';S.err='';S.notes='';S.uploadFiles=[];draw();
}

function canResetSubject(){
  var char=aC();if(!char||!char.subject)return false;
  if(U.isPro){
    // PRO: 1 reset per calendar month per character
    var now=new Date(),monthKey=now.getFullYear()+'-'+(now.getMonth()+1);
    return(!char.lastResetMonth||char.lastResetMonth!==monthKey);
  }else{
    // Free: 1 lifetime reset, only if <=1 dungeon
    return(!char.subjectResetUsed&&char.dungeons.length<=1);
  }
}
function resetSubject(){
  var char=aC();if(!char)return;
  if(!char.subject){alert('No subject is locked to this hero yet.');return;}
  if(!canResetSubject()){
    if(U.isPro){alert('You have already used your subject reset this month.\nYour next reset is available on the 1st of next month.');}
    else{alert('Free players get one lifetime reset per hero, and only before 2+ dungeons are created.\nUpgrade to PRO for a monthly reset!');}
    return;
  }
  var msg=U.isPro
    ?'Reset "'+char.subject+'" on '+char.charName+'? All dungeons for this hero will be deleted. You get one reset per month.'
    :'Reset "'+char.subject+'" on '+char.charName+'? Their dungeon will be deleted. This is your one-time free reset.';
  if(!confirm(msg))return;
  var now=new Date(),monthKey=now.getFullYear()+'-'+(now.getMonth()+1);
  char.subject=null;char.dungeons=[];char.finalBoss=null;
  if(U.isPro){char.lastResetMonth=monthKey;}
  else{char.subjectResetUsed=true;}
  saveUser();S.screen='hero';draw();
}
function friendlyApiError(err){
  var msg=err&&err.message?err.message:'Unknown error';
  if(msg.indexOf('529')>=0||msg.indexOf('overloaded')>=0){
    return 'Anthropic servers are busy right now. Wait a minute and try again.';
  }
  if(msg.indexOf('rate')>=0||msg.indexOf('429')>=0||msg.indexOf('limit')>=0||msg.indexOf('quota')>=0){
    return 'API limit reached. Please let Cade know the app hit its usage cap!';
  }
  if(msg.indexOf('401')>=0||msg.indexOf('auth')>=0||msg.indexOf('API key')>=0){
    return 'API key issue. Let b know!';
  }
  if(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0||msg.indexOf('Load failed')>=0||msg.indexOf('network')>=0){
    return 'Connection error — could not reach Anthropic. Raw error: '+msg;
  }
  if(msg.indexOf('503')>=0||msg.indexOf('502')>=0||msg.indexOf('500')>=0){
    return 'Anthropic is having issues right now. Try again in a few minutes.';
  }
  return 'API error: '+msg;
}

function goTo(sc){
  if(sc==='quiz'){S.qi=0;S.qs=0;S.sel=null;S.sxp=0;S.streak=0;S.wrongAnswers=[];}
  if(sc==='fc'){S.ci=0;S.fl=false;S.shuffled=null;S.againPile=null;}
  S.screen=sc;draw();
}
function draw(){
  var el=document.getElementById('app');if(!el)return;
  var screens={
    apikey:apiKeyH,onboard:onboardH,auth:authH,'char-create':charCreateH,home:homeH,hero:heroH,
    'char-select':charSelectH,dungeon:dungeonH,upload:uploadH,gen:genH,
    quizgen:quizGenH,fc:fcH,quiz:quizH,qd:qdH,paywall:paywallH,lvup:lvupH,'game-over':gameOverH,
    'pro-welcome':proWelcomeH,quests:questsH,achievements:achievementsH,calendar:calendarH,spells:spellsH,titles:achievementsH
  };
  el.innerHTML=(screens[S.screen]||authH)();
}
init();
